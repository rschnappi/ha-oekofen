# ÖkOfen Pellematic Dashboard
# Copy this to your Home Assistant dashboards
# or create a new dashboard and paste this YAML
#
# WICHTIG ZU DEN ENTITY-IDs:
# Die Integration übernimmt Sensor-Namen und Einheiten direkt vom Gerät
# (shortText/unitText aus der API), in der Sprache, die du beim Einrichten
# gewählt hast. Home Assistant leitet die Entity-ID daraus automatisch ab.
# Das bedeutet: Die tatsächlichen Entity-IDs sind NICHT z.B. "sensor.okofen_system_mode",
# sondern hängen von Host/Gerätename und der Gerätesprache ab, z.B.
# "sensor.okofen_192_168_1_50_betriebsart" oder "sensor.okofen_192_168_1_50_kesseltemperatur".
#
# So findest du deine echten Entity-IDs:
#   Einstellungen → Geräte & Dienste → Entitäten → nach "okofen" suchen
#
# In dieser Vorlage steht überall der Platzhalter DEINHOST für den
# host-abhängigen Teil der Entity-ID. Ersetze ihn (z.B. per Suchen & Ersetzen)
# durch das, was du in deiner Entitätenliste tatsächlich siehst.

title: ÖkOfen Heizung
views:
  - title: Übersicht
    path: overview
    icon: mdi:home-thermometer
    cards:
      # Betriebsarten (Operating Modes)
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🔧 Betriebsarten

          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_betriebsart
                name: Anlage
              - entity: sensor.okofen_DEINHOST_heizkreis_betriebsart
                name: Heizkreis
              - entity: sensor.okofen_DEINHOST_betriebsart_2
                name: Warmwasser
              - entity: sensor.okofen_DEINHOST_betriebsart_fa
                name: Pellematic (Kessel)

          # Services zum Ändern der Modi
          - type: horizontal-stack
            cards:
              - type: button
                name: Anlage Auto
                icon: mdi:cog-outline
                tap_action:
                  action: call-service
                  service: oekofen.set_system_mode
                  service_data:
                    mode: auto
              - type: button
                name: Heizung Auto
                icon: mdi:radiator
                tap_action:
                  action: call-service
                  service: oekofen.set_heating_mode
                  service_data:
                    circuit: 0
                    mode: auto
              - type: button
                name: Warmwasser Auto
                icon: mdi:water-boiler
                tap_action:
                  action: call-service
                  service: oekofen.set_hot_water_mode
                  service_data:
                    circuit: 0
                    mode: auto
              - type: button
                name: Kessel Auto
                icon: mdi:fire
                tap_action:
                  action: call-service
                  service: oekofen.set_pellematic_mode
                  service_data:
                    unit: 0
                    mode: auto

      # Allgemein (General)
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🌡️ Allgemein

          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_aussentemp_ist
                name: Außentemperatur
              - entity: sensor.okofen_DEINHOST_software_version
                name: Software Version
              - entity: update.ofen_integration_update
                name: Integration Update

      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 📊 Kessel & Heizkreis auf einen Blick
          - type: glance
            entities:
              - entity: sensor.okofen_DEINHOST_kesselstatus
                name: Kessel
              - entity: sensor.okofen_DEINHOST_kesseltemperatur
                name: Kessel °C
              - entity: sensor.okofen_DEINHOST_raumtemperatur_ist
                name: Raum °C
              - entity: sensor.okofen_DEINHOST_vorlauftemperatur_ist
                name: Vorlauf °C

  - title: Pellematic
    path: pellematic
    icon: mdi:fire
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🔥 Kessel
          - type: glance
            entities:
              - entity: sensor.okofen_DEINHOST_kesselstatus
                name: Status
              - entity: sensor.okofen_DEINHOST_betriebsart_fa
                name: Betriebsart
              - entity: sensor.okofen_DEINHOST_kesseltemperatur
                name: Temp
              - entity: sensor.okofen_DEINHOST_kesselsolltemperatur
                name: Soll
          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_kesseltemperatur
                name: Kesseltemperatur
                icon: mdi:thermometer-high
              - entity: sensor.okofen_DEINHOST_kesselsolltemperatur
                name: Kesseltemperatur Soll
                icon: mdi:thermometer-high
              - entity: sensor.okofen_DEINHOST_abgastemperatur
                name: Abgastemperatur
                icon: mdi:thermometer-chevron-up
              - entity: sensor.okofen_DEINHOST_feuerraumtemperatur
                name: Feuerraumtemperatur
                icon: mdi:fire
              - entity: sensor.okofen_DEINHOST_feuerraumtemperatur_soll
                name: Feuerraum Soll
                icon: mdi:fire
              - entity: sensor.okofen_DEINHOST_unterdruck
                name: Unterdruck
                icon: mdi:gauge
              - entity: sensor.okofen_DEINHOST_lufterdrehzahl
                name: Lüfterdrehzahl
                icon: mdi:fan
              - entity: sensor.okofen_DEINHOST_abgasgeblasedrehzahl
                name: Abgasgebläsedrehzahl
                icon: mdi:fan
              - entity: sensor.okofen_DEINHOST_drehzahl_umwalzpumpe
                name: Drehzahl Umwälzpumpe
                icon: mdi:pump
              - entity: sensor.okofen_DEINHOST_brenneranforderung
                name: Brenneranforderung
                icon: mdi:fire-alert

      # Pellet System
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🌾 Pellet-System & Förderung
          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_pelletsfullstand
                name: Pelletsfüllstand
                icon: mdi:sack
              - entity: sensor.okofen_DEINHOST_aktueller_fullstand
                name: Aktueller Füllstand
                icon: mdi:gauge
              - entity: sensor.okofen_DEINHOST_fullstand_zwischenbehalter
                name: Füllstand Zwischenbehälter
                icon: mdi:gauge
              - entity: sensor.okofen_DEINHOST_drehzahl_schnecke_aschebox
                name: Drehzahl Schnecke Aschebox
                icon: mdi:cog-clockwise
              - entity: sensor.okofen_DEINHOST_saugintervall
                name: Saugintervall
                icon: mdi:timer-sand

      # Störungen
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## ⚠️ Störungen
          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_stormelderelais
                name: Störmelderelais
                icon: mdi:alert-circle

  - title: Heizkreis
    path: heizkreis
    icon: mdi:radiator
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🏠 Heizkreis 1
          - type: glance
            entities:
              - entity: sensor.okofen_DEINHOST_heizkreis_betriebsart
                name: Modus
              - entity: sensor.okofen_DEINHOST_raumtemperatur_ist
                name: Raum
              - entity: sensor.okofen_DEINHOST_vorlauftemperatur_ist
                name: Vorlauf
              - entity: sensor.okofen_DEINHOST_pumpe
                name: Pumpe
          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_raumtemperatur_ist
                name: Raumtemperatur
                icon: mdi:home-thermometer
              - entity: sensor.okofen_DEINHOST_vorlauftemperatur_ist
                name: Vorlauftemperatur
                icon: mdi:thermometer-lines
              - entity: sensor.okofen_DEINHOST_pumpe
                name: Heizkreispumpe
                icon: mdi:pump
              # Zeit1/2-Umschalter - siehe automations_example.yaml + helpers_example.yaml
              - entity: input_select.okofen_zeitprogramm_heizkreis
                name: Aktives Zeitprogramm
                icon: mdi:clock-outline

      # Einstellungen Heizkreis - editierbar über input_number-Helfer,
      # siehe helpers_example.yaml und automations_example.yaml
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## ⚙️ Einstellungen Heizkreis 1
              *Editierbare Felder - erfordern die Helfer/Automatisierungen aus
              helpers_example.yaml und automations_example.yaml*
          - type: entities
            entities:
              - entity: input_number.okofen_raumtemperatur_heizen
                name: Raumtemperatur Heizen (Soll)
                icon: mdi:thermometer-high
                mode: box
              - entity: input_number.okofen_absenktemp_soll
                name: Raumtemperatur Absenken (Soll)
                icon: mdi:thermometer-low
                mode: box
              - entity: input_number.okofen_heizkurve
                name: Heizkennlinie
                icon: mdi:chart-line
                mode: box
              - entity: input_number.okofen_fusspunkt
                name: Fußpunkt
                icon: mdi:chart-line-variant
                mode: box
              - entity: input_number.okofen_heizgrenze_heizen
                name: Heizgrenze Heizen
                icon: mdi:thermometer-alert
                mode: box
              - entity: input_number.okofen_heizgrenze_absenken
                name: Heizgrenze Absenken
                icon: mdi:thermometer-alert
                mode: box
              - entity: input_number.okofen_vorlauf_max
                name: Vorlauf Max
                icon: mdi:thermometer-chevron-up
                mode: box
              - entity: input_number.okofen_vorlauf_min
                name: Vorlauf Min
                icon: mdi:thermometer-chevron-down
                mode: box

  - title: Warmwasser
    path: warmwasser
    icon: mdi:water-boiler
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 💧 Warmwasser
          - type: glance
            entities:
              - entity: sensor.okofen_DEINHOST_betriebsart_2
                name: Modus
              - entity: input_number.okofen_wassertemp_soll
                name: Solltemp
              - entity: sensor.okofen_DEINHOST_temp_soll
                name: Aktuelles Ziel
              - entity: sensor.okofen_DEINHOST_pumpe_2
                name: Pumpe
          - type: entities
            entities:
              # Editierbar, siehe helpers_example.yaml / automations_example.yaml
              - entity: input_number.okofen_wassertemp_soll
                name: Wassertemperatur Soll
                icon: mdi:thermometer
                mode: box
              - entity: sensor.okofen_DEINHOST_wassertemp_min
                name: Wassertemperatur Min
                icon: mdi:thermometer-low
              - entity: sensor.okofen_DEINHOST_pumpe_2
                name: Warmwasserpumpe
                icon: mdi:pump
              - entity: input_select.okofen_zeitprogramm_warmwasser
                name: Aktives Zeitprogramm
                icon: mdi:clock-outline
              - entity: sensor.okofen_DEINHOST_einmal_aufbereiten
                name: Einmal Aufbereiten
                icon: mdi:water-boiler-auto
              - entity: sensor.okofen_DEINHOST_legionellenschutz
                name: Legionellenschutz
                icon: mdi:shield-check

  - title: Puffer & Pumpen
    path: puffer
    icon: mdi:water-pump
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🗄️ Pufferspeicher
          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_einschaltfuhler_ist
                name: Einschaltfühler (oben)
                icon: mdi:thermometer-chevron-up
              - entity: sensor.okofen_DEINHOST_ausschaltfuhler_ist
                name: Ausschaltfühler (unten)
                icon: mdi:thermometer-chevron-down
              # Editierbar - gehören zum Warmwasser-Kreis (ww[0]), nicht zum
              # allgemeinen Kesselbetrieb! Siehe helpers_example.yaml
              - entity: input_number.okofen_ueberhohung_ww
                name: Überhöhung (Warmwasser)
                icon: mdi:altimeter
                mode: box
              - entity: input_number.okofen_nachlaufzeit_ww
                name: Nachlaufzeit (Warmwasser)
                icon: mdi:timer-outline
                mode: box
              - entity: input_number.okofen_hysterese_ww
                name: Hysterese (Warmwasser)
                icon: mdi:sine-wave
                mode: box

      # Zubringer-/Pufferpumpen
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🔄 Pumpen
              *Hinweis: Das Gerät liefert für mehrere Pumpen denselben Namen
              "Pumpe" - welche Entity zu welchem Kreis gehört, musst du bei dir
              über Entity-ID-Nummerierung (pumpe, pumpe_2, pumpe_3, ...) und
              Beobachtung zuordnen.*
          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_pumpe
                name: Pumpe 1
                icon: mdi:pump
              - entity: sensor.okofen_DEINHOST_pumpe_2
                name: Pumpe 2
                icon: mdi:pump
              - entity: sensor.okofen_DEINHOST_pumpe_3
                name: Pumpe 3
                icon: mdi:pump
              - entity: sensor.okofen_DEINHOST_pumpe_4
                name: Pumpe 4
                icon: mdi:pump

  - title: Statistik
    path: statistik
    icon: mdi:chart-line
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## ⏱️ Betriebsstunden & Zyklen
          - type: entities
            entities:
              - entity: sensor.okofen_DEINHOST_brennerlaufzeit
                name: Brennerlaufzeit gesamt
                icon: mdi:clock-outline
              - entity: sensor.okofen_DEINHOST_mitllere_brennerlaufzeit
                name: Mittlere Brennerlaufzeit
                icon: mdi:clock-outline
              - entity: sensor.okofen_DEINHOST_stillstandszeit
                name: Stillstandszeit
                icon: mdi:clock-alert-outline
              - entity: sensor.okofen_DEINHOST_brennerstarts
                name: Brennerstarts
                icon: mdi:restart
              - entity: sensor.okofen_DEINHOST_anzahl_zuendungen
                name: Anzahl Zündungen
                icon: mdi:fire

      - type: history-graph
        title: Temperaturverlauf
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - entity: sensor.okofen_DEINHOST_aussentemp_ist
            name: Außentemperatur
          - entity: sensor.okofen_DEINHOST_raumtemperatur_ist
            name: Raum
          - entity: sensor.okofen_DEINHOST_vorlauftemperatur_ist
            name: Vorlauf
          - entity: sensor.okofen_DEINHOST_kesseltemperatur
            name: Kessel
